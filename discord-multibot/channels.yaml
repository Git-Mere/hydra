# 채널 ID를 키로 사용. 봇이 반응할 채널만 등록.
# 채널 추가 = 아래에 항목 하나 추가. 코드 수정 불필요.
# 채널 ID는 디스코드에서 개발자 모드 활성화 후 채널 우클릭 > "ID 복사"로 확인.
channels:
  "111111111111111111":       # 예: #번역 채널 ID (placeholder — 실제 ID로 교체)
    mode: translate
    model: "qwen/qwen-3-8b:free"
    trigger: auto             # 모든 메시지 자동 번역
    enabled: true

  "222222222222222222":       # 예: #질문 채널 ID (placeholder — 실제 ID로 교체)
    mode: chat
    model: "deepseek/deepseek-r1:free"
    trigger: mention          # @봇 멘션 시에만 응답
    enabled: true
    system_override: null     # 필요시 이 채널만의 프롬프트로 덮어쓰기
